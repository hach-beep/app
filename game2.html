<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Strike Online</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; text-align: center; }
        canvas { background: #000; border-bottom: 2px solid #0ff; width: 100%; height: 45vh; display: block; }
        
        /* UI Overlay */
        #setup, #win-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #win-screen { display: none; }
        input { padding: 12px; font-size: 1.2rem; border-radius: 8px; border: none; margin-bottom: 10px; text-align: center; }
        button.start-btn { padding: 15px 40px; font-size: 1.5rem; background: #0ff; border: none; border-radius: 8px; font-weight: bold; }
        
        #game-ui { height: 15vh; display: flex; flex-direction: column; justify-content: center; background: #111; }
        .score-row { display: flex; justify-content: space-around; font-size: 1.2rem; font-weight: bold; }
        #status-msg { color: #ff00ff; font-size: 0.9rem; margin-top: 5px; }

        /* Mobile Controls */
        .controls { display: flex; justify-content: space-around; align-items: center; height: 40vh; background: #0a0a0a; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 65px); grid-gap: 8px; }
        .btn { width: 65px; height: 65px; background: #222; border: 2px solid #0ff; color: #0ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; }
        .btn:active { background: #0ff; color: #000; }
        .fire-btn { width: 100px; height: 100px; background: #ff0055; color: white; border-radius: 50%; border: none; font-weight: bold; font-size: 1.4rem; box-shadow: 0 0 20px #ff0055; }
        
        .victory-text { font-size: 3rem; color: #0ff; text-shadow: 0 0 20px #0ff; }
    </style>
</head>
<body>

    <!-- Join Screen -->
    <div id="setup">
        <h1 style="color:#0ff">NEON STRIKE</h1>
        <input type="text" id="name-input" placeholder="Enter Your Name" maxlength="10">
        <button class="start-btn" id="join-btn">PLAY</button>
    </div>

    <!-- Win Screen -->
    <div id="win-screen">
        <h1 class="victory-text" id="win-msg">VICTORY!</h1>
        <p id="winner-name" style="font-size:1.5rem"></p>
        <button class="start-btn" onclick="location.reload()">REMATCH</button>
    </div>

    <div id="game-ui">
        <div class="score-row">
            <div id="p1-label" style="color:#0ff">P1: 0</div>
            <div id="p2-label" style="color:#f05">P2: 0</div>
        </div>
        <div id="status-msg">Searching for opponent...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="d-pad">
            <div></div><div class="btn" id="up">▲</div><div></div>
            <div class="btn" id="left">◀</div><div class="btn" id="down">▼</div><div class="btn" id="right">▶</div>
        </div>
        <button class="fire-btn" id="fire">FIRE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdv_CdkpQy_yN7_jAPOJ_6-C3obCoXVIg",
            authDomain: "game-3f597.firebaseapp.com",
            projectId: "game-3f597",
            storageBucket: "game-3f597.firebasestorage.app",
            messagingSenderId: "151158588836",
            appId: "1:151158588836:web:6e242416de05fb0b1ced31",
            measurementId: "G-FWX8ZBTDS6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400;

        let myRole = ""; 
        let myName = "";
        let players = { 
            p1: {x:50, y:200, s:0, name: "Waiting..."}, 
            p2: {x:320, y:200, s:0, name: "Waiting..."} 
        };
        let bullets = [];
        let gameActive = false;

        document.getElementById('join-btn').onclick = async () => {
            myName = document.getElementById('name-input').value || "Player";
            const p1Snap = await getDoc(doc(db, "duel", "p1"));
            
            myRole = !p1Snap.exists() ? "p1" : "p2";
            await setDoc(doc(db, "duel", myRole), {
                x: myRole === "p1" ? 50 : 320,
                y: 200, s: 0, name: myName
            });
            
            document.getElementById('setup').style.display = 'none';
            gameActive = true;
        };

        // Sync Data
        onSnapshot(doc(db, "duel", "p1"), (s) => { 
            if(s.exists()) {
                players.p1 = s.data();
                updateUI();
            }
        });
        onSnapshot(doc(db, "duel", "p2"), (s) => { 
            if(s.exists()) {
                players.p2 = s.data();
                updateUI();
            }
        });

        function updateUI() {
            document.getElementById('p1-label').innerText = `${players.p1.name}: ${players.p1.s}`;
            document.getElementById('p2-label').innerText = `${players.p2.name}: ${players.p2.s}`;
            
            if(players.p1.name !== "Waiting..." && players.p2.name !== "Waiting...") {
                document.getElementById('status-msg').innerText = "MATCH IN PROGRESS";
            }

            // Check Win Condition
            if (players.p1.s >= 5) showWin(players.p1.name);
            if (players.p2.s >= 5) showWin(players.p2.name);
        }

        function showWin(winner) {
            gameActive = false;
            document.getElementById('win-screen').style.display = 'flex';
            document.getElementById('win-msg').innerText = (winner === myName) ? "VICTORY!" : "DEFEAT";
            document.getElementById('winner-name').innerText = winner + " is the Champion!";
        }

        // Move Logic
        let move = { x: 0, y: 0 };
        const handleTouch = (id, x, y) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); if(gameActive) { move.x = x; move.y = y; } };
            el.ontouchend = () => { move.x = 0; move.y = 0; };
        };
        handleTouch('up', 0, -6); handleTouch('down', 0, 6);
        handleTouch('left', -6, 0); handleTouch('right', 6, 0);

        document.getElementById('fire').onclick = () => {
            if(!gameActive) return;
            bullets.push({ 
                x: players[myRole].x + 12, y: players[myRole].y + 10, 
                v: myRole === "p1" ? 12 : -12 
            });
        };

        function gameLoop() {
            if (gameActive && myRole && (move.x !== 0 || move.y !== 0)) {
                players[myRole].x += move.x;
                players[myRole].y += move.y;
                // Boundary check
                players[myRole].x = Math.max(0, Math.min(375, players[myRole].x));
                players[myRole].y = Math.max(0, Math.min(375, players[myRole].y));
                
                updateDoc(doc(db, "duel", myRole), { x: players[myRole].x, y: players[myRole].y });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Players
            ctx.shadowBlur = 15;
            ctx.fillStyle = "#0ff"; ctx.shadowColor = "#0ff";
            ctx.fillRect(players.p1.x, players.p1.y, 25, 25);
            
            ctx.fillStyle = "#f05"; ctx.shadowColor = "#f05";
            ctx.fillRect(players.p2.x, players.p2.y, 25, 25);

            // Bullets
            bullets.forEach((b, i) => {
                b.x += b.v;
                ctx.fillStyle = "#fff"; ctx.shadowColor = "#fff";
                ctx.fillRect(b.x, b.y, 12, 4);
                
                let enemy = myRole === "p1" ? "p2" : "p1";
                let dist = Math.hypot(b.x - players[enemy].x, b.y - players[enemy].y);
                
                if (dist < 25) {
                    bullets.splice(i, 1);
                    if(gameActive) {
                        players[myRole].s++;
                        updateDoc(doc(db, "duel", myRole), { s: players[myRole].s });
                    }
                }
                if(b.x < 0 || b.x > 400) bullets.splice(i, 1);
            });

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
