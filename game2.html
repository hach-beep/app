                    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Firestore Duel</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; touch-action: none; text-align: center; }
        canvas { background: #050505; border-bottom: 2px solid #333; width: 100%; height: 45vh; display: block; }
        #ui { height: 15vh; padding: 5px; }
        .score-board { display: flex; justify-content: center; gap: 30px; font-size: 1.2rem; font-weight: bold; }
        
        /* Mobile Controls */
        .controls { display: flex; justify-content: space-around; align-items: center; height: 40vh; background: #111; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 60px); grid-gap: 10px; }
        .btn { width: 60px; height: 60px; background: #222; border: 2px solid #0ff; color: #0ff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
        .btn:active { background: #0ff; color: #000; }
        .fire-btn { width: 90px; height: 90px; background: #ff0055; color: white; border-radius: 50%; border: none; font-weight: bold; font-size: 1.2rem; box-shadow: 0 0 20px #ff0055; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="status">Connecting...</div>
        <div class="score-board">
            <span style="color:#00d2ff">P1: <span id="p1-score">0</span></span>
            <span style="color:#ff3366">P2: <span id="p2-score">0</span></span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <div class="d-pad">
            <div></div><div class="btn" id="up">▲</div><div></div>
            <div class="btn" id="left">◀</div><div class="btn" id="down">▼</div><div class="btn" id="right">▶</div>
        </div>
        <button class="fire-btn" id="fire">FIRE</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDdv_CdkpQy_yN7_jAPOJ_6-C3obCoXVIg",
            authDomain: "game-3f597.firebaseapp.com",
            projectId: "game-3f597",
            storageBucket: "game-3f597.firebasestorage.app",
            messagingSenderId: "151158588836",
            appId: "1:151158588836:web:6e242416de05fb0b1ced31",
            measurementId: "G-FWX8ZBTDS6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400;

        let myRole = ""; // "p1" or "p2"
        let players = { p1: {x:50, y:200, s:0}, p2: {x:320, y:200, s:0} };
        let bullets = [];

        // Determine Role
        async function joinGame() {
            const p1Ref = doc(db, "duel", "p1");
            const p1Snap = await getDoc(p1Ref);
            
            if (!p1Snap.exists()) {
                myRole = "p1";
                await setDoc(p1Ref, {x:50, y:200, s:0, t: Date.now()});
                document.getElementById('status').innerText = "YOU ARE BLUE (P1)";
            } else {
                myRole = "p2";
                await setDoc(doc(db, "duel", "p2"), {x:320, y:200, s:0, t: Date.now()});
                document.getElementById('status').innerText = "YOU ARE RED (P2)";
            }
        }
        joinGame();

        // Listen for updates
        onSnapshot(doc(db, "duel", "p1"), (s) => { if(s.exists()) players.p1 = s.data(); });
        onSnapshot(doc(db, "duel", "p2"), (s) => { if(s.exists()) players.p2 = s.data(); });

        // Controls
        let move = { x: 0, y: 0 };
        const handleTouch = (id, x, y) => {
            const el = document.getElementById(id);
            el.ontouchstart = (e) => { e.preventDefault(); move.x = x; move.y = y; };
            el.ontouchend = () => { move.x = 0; move.y = 0; };
        };
        handleTouch('up', 0, -5); handleTouch('down', 0, 5);
        handleTouch('left', -5, 0); handleTouch('right', 5, 0);

        document.getElementById('fire').onclick = () => {
            bullets.push({ 
                x: players[myRole].x + 10, 
                y: players[myRole].y + 10, 
                v: myRole === "p1" ? 10 : -10 
            });
        };

        function gameLoop() {
            // Update My Position
            if (myRole && (move.x !== 0 || move.y !== 0)) {
                players[myRole].x += move.x;
                players[myRole].y += move.y;
                updateDoc(doc(db, "duel", myRole), { x: players[myRole].x, y: players[myRole].y });
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Players
            ctx.shadowBlur = 10;
            ctx.fillStyle = "#0ff"; ctx.shadowColor = "#0ff";
            ctx.fillRect(players.p1.x, players.p1.y, 25, 25);
            ctx.fillStyle = "#f05"; ctx.shadowColor = "#f05";
            ctx.fillRect(players.p2.x, players.p2.y, 25, 25);

            // UI
            document.getElementById('p1-score').innerText = players.p1.s || 0;
            document.getElementById('p2-score').innerText = players.p2.s || 0;

            // Bullets
            bullets.forEach((b, i) => {
                b.x += b.v;
                ctx.fillStyle = "white"; ctx.fillRect(b.x, b.y, 10, 4);
                
                // Hit Logic
                let enemy = myRole === "p1" ? "p2" : "p1";
                let dist = Math.hypot(b.x - players[enemy].x, b.y - players[enemy].y);
                if (dist < 25) {
                    bullets.splice(i, 1);
                    players[myRole].s++;
                    updateDoc(doc(db, "duel", myRole), { s: players[myRole].s });
                }
                if(b.x < 0 || b.x > 400) bullets.splice(i, 1);
            });

            requestAnimationFrame(gameLoop);
        }
        gameLoop();
    </script>
</body>
</html>
