<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; background: white; border: 2px solid #333; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; cursor: pointer; }
        .cell.taken { cursor: not-allowed; }
        #status { margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
        .controls { margin-top: 20px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="status">Enter a Room Name to Start</div>
    
    <div class="controls">
        <input type="text" id="roomInput" placeholder="Room Name (e.g. game123)">
        <button onclick="joinRoom()">Join/Create Room</button>
    </div>

    <br>

    <div class="board" id="board">
        <div class="cell" onclick="makeMove(0)"></div>
        <div class="cell" onclick="makeMove(1)"></div>
        <div class="cell" onclick="makeMove(2)"></div>
        <div class="cell" onclick="makeMove(3)"></div>
        <div class="cell" onclick="makeMove(4)"></div>
        <div class="cell" onclick="makeMove(5)"></div>
        <div class="cell" onclick="makeMove(6)"></div>
        <div class="cell" onclick="makeMove(7)"></div>
        <div class="cell" onclick="makeMove(8)"></div>
    </div>

    <button onclick="resetGame()" style="margin-top: 20px;">Reset Game</button>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>

    <script>
        // --- 1. REPLACE THIS WITH YOUR CONFIG FROM FIREBASE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT.firebaseio.com",
            projectId: "YOUR_PROJECT",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        // -----------------------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let roomName = "";
        let playerSymbol = ""; // X or O
        let currentBoard = Array(9).fill("");
        let currentTurn = "X";

        function joinRoom() {
            roomName = document.getElementById('roomInput').value;
            if (!roomName) return alert("Enter a room name!");

            const roomRef = db.ref('rooms/' + roomName);

            roomRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    // Create room, I am X
                    playerSymbol = "X";
                    roomRef.set({
                        board: Array(9).fill(""),
                        turn: "X",
                        playerCount: 1
                    });
                } else if (data.playerCount === 1) {
                    // Join room, I am O
                    playerSymbol = "O";
                    roomRef.update({ playerCount: 2 });
                } else {
                    // Room full - view only or try another
                    playerSymbol = "Viewer";
                }
                document.getElementById('status').innerText = `You are: ${playerSymbol} | Room: ${roomName}`;
                listenToRoom();
            });
        }

        function listenToRoom() {
            db.ref('rooms/' + roomName).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                currentBoard = data.board;
                currentTurn = data.turn;
                updateUI();
                checkWinner();
            });
        }

        function updateUI() {
            const cells = document.querySelectorAll('.cell');
            currentBoard.forEach((val, index) => {
                cells[index].innerText = val;
                if (val !== "") cells[index].classList.add('taken');
                else cells[index].classList.remove('taken');
            });
            
            if (playerSymbol !== "Viewer") {
                document.getElementById('status').innerText = 
                    (currentTurn === playerSymbol) ? "Your Turn!" : "Waiting for opponent...";
            }
        }

        function makeMove(index) {
            if (playerSymbol === "Viewer") return;
            if (currentTurn !== playerSymbol) return;
            if (currentBoard[index] !== "") return;

            currentBoard[index] = playerSymbol;
            const nextTurn = (playerSymbol === "X") ? "O" : "X";

            db.ref('rooms/' + roomName).update({
                board: currentBoard,
                turn: nextTurn
            });
        }

        function resetGame() {
            if (!roomName) return;
            db.ref('rooms/' + roomName).update({
                board: Array(9).fill(""),
                turn: "X"
            });
        }

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let combo of wins) {
                const [a, b, c] = combo;
                if (currentBoard[a] && currentBoard[a] === currentBoard[b] && currentBoard[a] === currentBoard[c]) {
                    document.getElementById('status').innerText = `${currentBoard[a]} Wins!`;
                    return;
                }
            }
            if (!currentBoard.includes("")) {
                document.getElementById('status').innerText = "Draw!";
            }
        }
    </script>
</body>
</html>
