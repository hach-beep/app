                <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firestore Tic-Tac-Toe</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #eef2f3; margin: 0; }
        #status { margin-bottom: 15px; font-size: 1.2rem; font-weight: bold; color: #333; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 8px; }
        .cell { width: 100px; height: 100px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s; }
        .cell:hover { background: #f9f9f9; }
        .cell.taken { cursor: not-allowed; color: #555; }
        .controls { margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        button { padding: 10px 20px; border: none; background: #007bff; color: white; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .reset-btn { margin-top: 25px; background: #dc3545; }
    </style>
</head>
<body>

    <div id="status">Create or Join a Room</div>
    
    <div class="controls">
        <input type="text" id="roomInput" placeholder="Room Name (e.g. play1)">
        <button id="joinBtn">Join Room</button>
    </div>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <button id="resetBtn" class="reset-btn">Reset Game</button>

    <script type="module">
        // Import Firestore functions
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { 
            getFirestore, doc, setDoc, onSnapshot, updateDoc, getDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- 1. CONFIGURATION (REPLACE THIS WITH YOURS) ---
        const firebaseConfig = {
  apiKey: "AIzaSyDdv_CdkpQy_yN7_jAPOJ_6-C3obCoXVIg",
  authDomain: "game-3f597.firebaseapp.com",
  projectId: "game-3f597",
  storageBucket: "game-3f597.firebasestorage.app",
  messagingSenderId: "151158588836",
  appId: "1:151158588836:web:fd6abfc075fb99fb1ced31",
  measurementId: "G-3FJDYS0ZW1"
};
    

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let roomName = "";
        let playerSymbol = ""; 
        let currentBoard = Array(9).fill("");
        let currentTurn = "X";

        const statusDisplay = document.getElementById('status');
        const cells = document.querySelectorAll('.cell');
        const roomInput = document.getElementById('roomInput');

        // Join Room Logic
        document.getElementById('joinBtn').addEventListener('click', async () => {
            roomName = roomInput.value.trim().toLowerCase();
            if (!roomName) return alert("Enter a room name!");

            const docRef = doc(db, "games", roomName);
            const docSnap = await getDoc(docRef);

            if (!docSnap.exists()) {
                // First player joins
                playerSymbol = "X";
                await setDoc(docRef, {
                    board: Array(9).fill(""),
                    turn: "X",
                    players: 1
                });
            } else {
                const data = docSnap.data();
                if (data.players === 1) {
                    playerSymbol = "O";
                    await updateDoc(docRef, { players: 2 });
                } else {
                    playerSymbol = "Viewer";
                    alert("Room full! You are watching.");
                }
            }

            statusDisplay.innerText = `You are: ${playerSymbol} | Room: ${roomName}`;
            listenToGame();
        });

        // Real-time listener
        function listenToGame() {
            onSnapshot(doc(db, "games", roomName), (doc) => {
                const data = doc.data();
                if (!data) return;

                currentBoard = data.board;
                currentTurn = data.turn;
                
                // Update UI
                cells.forEach((cell, i) => {
                    cell.innerText = currentBoard[i];
                    if (currentBoard[i] !== "") cell.classList.add('taken');
                    else cell.classList.remove('taken');
                });

                if (playerSymbol !== "Viewer") {
                    statusDisplay.innerText = (currentTurn === playerSymbol) ? "Your Turn!" : "Waiting for opponent...";
                }
                checkWinner();
            });
        }

        // Make Move
        cells.forEach(cell => {
            cell.addEventListener('click', async (e) => {
                const index = e.target.dataset.index;
                if (playerSymbol === "Viewer" || currentTurn !== playerSymbol || currentBoard[index] !== "") return;

                currentBoard[index] = playerSymbol;
                const nextTurn = playerSymbol === "X" ? "O" : "X";

                await updateDoc(doc(db, "games", roomName), {
                    board: currentBoard,
                    turn: nextTurn
                });
            });
        });

        // Reset Game
        document.getElementById('resetBtn').addEventListener('click', async () => {
            if (!roomName) return;
            await updateDoc(doc(db, "games", roomName), {
                board: Array(9).fill(""),
                turn: "X"
            });
        });

        function checkWinner() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for (let combo of wins) {
                const [a, b, c] = combo;
                if (currentBoard[a] && currentBoard[a] === currentBoard[b] && currentBoard[a] === currentBoard[c]) {
                    statusDisplay.innerText = `${currentBoard[a]} Wins!`;
                    return;
                }
            }
            if (!currentBoard.includes("") && roomName !== "") {
                statusDisplay.innerText = "Draw!";
            }
        }
    </script>
</body>
</html>
