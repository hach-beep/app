<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Private Space ❤️</title>
    <link rel="manifest" href="manifest.json">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>

    <style>
        :root {
            --my-color: #81d4fa; /* Sky Blue */
            --his-color: #e0e0e0; /* Soft Grey */
            --bg-color: #f0f4f8;  /* Light Blue-Grey Background */
            --text-dark: #333;
            --text-white: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        /* Login Screen */
        #login-screen {
            position: fixed; inset: 0; background: white; z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-card {
            width: 80%; max-width: 300px; text-align: center;
        }
        input {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;
        }
        .btn-primary {
            background: var(--my-color); border: none; padding: 12px; width: 100%; border-radius: 8px; color: white; font-weight: bold; cursor: pointer;
        }

        /* Chat Area */
        #chat { 
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; 
            scroll-behavior: smooth;
        }
        .msg { 
            margin: 6px 0; padding: 12px 16px; border-radius: 20px; max-width: 75%; 
            word-wrap: break-word; font-size: 15px; line-height: 1.4;
            position: relative; transition: opacity 0.3s;
        }
        .me { 
            background: var(--my-color); color: var(--text-white); align-self: flex-end; 
            border-bottom-right-radius: 4px;
        }
        .him { 
            background: var(--his-color); color: var(--text-dark); align-self: flex-start; 
            border-bottom-left-radius: 4px;
        }
        .pending { opacity: 0.6; }
        .pending::after { content: " ⏳"; font-size: 10px; }

        /* Media */
        img, video { max-width: 100%; border-radius: 12px; display: block; margin-top: 5px; }

        /* Input Area */
        .input-area { 
            background: white; padding: 10px 15px; display: flex; align-items: center; 
            gap: 10px; border-top: 1px solid #dee2e6; padding-bottom: calc(10px + env(safe-area-inset-bottom));
        }
        #msgInput { flex: 1; border: none; background: #f1f3f4; padding: 12px 18px; border-radius: 25px; outline: none; }
        .icon-btn { font-size: 24px; cursor: pointer; user-select: none; }
        #sendBtn { color: var(--my-color); font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 style="color: var(--my-color)">Our Space ❤️</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn-primary" onclick="login()">Login</button>
        </div>
    </div>

    <div id="chat"></div>

    <div class="input-area">
        <input type="file" id="fileBtn" accept="image/*,video/*" style="display:none">
        <span class="icon-btn" onclick="document.getElementById('fileBtn').click()">🖼️</span>
        <input type="text" id="msgInput" placeholder="Type a message...">
        <span class="icon-btn" id="sendBtn">➤</span>
    </div>

    <script>
        // 1. YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY",
            authDomain: "PASTE_YOUR_PROJECT.firebaseapp.com",
            projectId: "PASTE_YOUR_PROJECT",
            storageBucket: "PASTE_YOUR_PROJECT.appspot.com",
            messagingSenderId: "...",
            appId: "..."
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // 2. OFFLINE PERSISTENCE
        db.enablePersistence().catch(err => console.error("Persistence failed", err));

        // 3. LOGIN
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => document.getElementById('login-screen').style.display = 'none')
                .catch(err => alert(err.message));
        }

        auth.onAuthStateChanged(user => {
            if (user) document.getElementById('login-screen').style.display = 'none';
        });

        // 4. SEND TEXT
        function sendMessage() {
            const text = document.getElementById('msgInput').value;
            if(text && auth.currentUser) {
                db.collection("messages").add({
                    uid: auth.currentUser.uid,
                    text: text,
                    type: "text",
                    time: Date.now()
                });
                document.getElementById('msgInput').value = "";
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

        // 5. SEND MEDIA (Only if Online)
        document.getElementById('fileBtn').onchange = async (e) => {
            if(!navigator.onLine) return alert("You need internet to send photos/videos!");
            const file = e.target.files[0];
            if(!file) return;
            
            const path = `media/${Date.now()}_${file.name}`;
            const ref = storage.ref(path);
            
            try {
                await ref.put(file);
                const url = await ref.getDownloadURL();
                db.collection("messages").add({
                    uid: auth.currentUser.uid,
                    url: url,
                    type: file.type.includes('video') ? 'video' : 'image',
                    time: Date.now()
                });
            } catch (err) { alert("Upload failed!"); }
        };

        // 6. LISTEN FOR MESSAGES
        db.collection("messages").orderBy("time").onSnapshot({ includeMetadataChanges: true }, snap => {
            const chat = document.getElementById('chat');
            chat.innerHTML = "";
            
            snap.forEach(doc => {
                const data = doc.data();
                const isMe = data.uid === auth.currentUser?.uid;
                const isPending = doc.metadata.hasPendingWrites;

                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'him'} ${isPending ? 'pending' : ''}`;
                
                if(data.type === "text") {
                    div.innerText = data.text;
                } else if(data.type === "image") {
                    div.innerHTML = `<img src="${data.url}" loading="lazy">`;
                } else if(data.type === "video") {
                    div.innerHTML = `<video src="${data.url}" controls></video>`;
                }
                chat.appendChild(div);
            });
            chat.scrollTop = chat.scrollHeight;
        });

        // Register sw.js for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
